# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx2048m --add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.java.installations.auto-download=true
org.gradle.java.installations.auto-download.silent=true

# Android-specific properties
android.useAndroidX=true
android.enableJetifier=true
android.compileSdk=34
android.minSdk=24
android.targetSdk=34
